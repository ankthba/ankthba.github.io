<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Aniketh Bandlamudi</title>
  <meta name="description" content="The page you're looking for can't be found.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" type="image/png" href="/assets/img/anikethFavicon.jpg">
  <style>
    .error-code {
      font-family: var(--font-serif);
      font-size: clamp(5rem, 18vw, 11rem);
      font-weight: 400;
      line-height: 0.9;
      letter-spacing: -0.04em;
      margin: 0 0 var(--space-sm);
      color: var(--color-fg);
    }

    .error-lead {
      max-width: 42ch;
      margin: 0 0 var(--space-md);
      line-height: 1.6;
      color: var(--color-muted);
    }

    /* Mobile: center the block to match the centered header + page title */
    @media (max-width: 768px) {
      .home__right { text-align: center; }
      .error-lead { margin-left: auto; margin-right: auto; }
    }
  </style>
</head>
<body>
  <main>
    <section class="home" id="error">
      <div class="home__left home__left--centered">
        <h1 class="hero__title" id="hero-title"><a href="/" style="text-decoration: none; color: inherit;"><span class="hero__name-first">Aniketh</span><br><span class="hero__name-last">Bandlamudi</span></a></h1>
        <nav class="hero__nav">
          <a href="/projects/" class="hero__nav-link">Projects</a>
          <a href="/work/" class="hero__nav-link">Experience</a>
          <a href="/photos/" class="hero__nav-link">Photography</a>
          <a href="/writing/" class="hero__nav-link">Writing</a>
          <a href="/contact/" class="hero__nav-link">Contact</a>
        </nav>
      </div>

      <div class="home__right">
        <p class="error-code">404</p>
        <h2 class="page-title">Page not found</h2>
        <p class="error-lead">The page you're looking for doesn't exist or may have been moved.</p>
        <a href="/" class="btn">
          Back to home
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </a>
      </div>
    </section>
  </main>

  <script>
    // Apply saved theme before paint to avoid a flash
    (function () {
      document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'auto');
    })();
  </script>
  <script src="/assets/js/main.js" defer></script>
</body>
</html>
