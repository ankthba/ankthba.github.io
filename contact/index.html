<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Aniketh Bandlamudi</title>
  <meta name="description" content="Get in touch with Aniketh Bandlamudi.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" type="image/png" href="../anikethFavicon.jpg">
</head>
<body>
  <header class="page-header">
    <a href="/" class="page-header__name">Aniketh Bandlamudi</a>
    <nav class="page-header__nav">
      <a href="/projects/" class="page-header__nav-link">Projects</a>
      <a href="/work/" class="page-header__nav-link">Work</a>
      <a href="/photos/" class="page-header__nav-link">Photography</a>
      <a href="/writing/" class="page-header__nav-link">Writing</a>
      <a href="/contact/" class="page-header__nav-link active">Contact</a>
    </nav>
  </header>

  <main>
    <section class="contact" id="contact" style="min-height: calc(100vh - 180px);">
      <div class="container">
        <div class="contact__inner">
          <div class="contact__header">
            <h2>Contact</h2>
          </div>
          <p class="contact__text">Open to inquiries and questions.</p>
          <a href="mailto:me@aniketh.net" class="btn">
            Send Message
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </a>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__copy">&copy; <span id="year"></span> Aniketh Bandlamudi</p>
      <select class="theme-toggle" id="theme-toggle" aria-label="Theme">
        <option value="auto">Auto</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>
  </footer>

  <script src="../main.js" defer></script>
</body>
</html>
