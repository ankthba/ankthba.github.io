<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Aniketh Bandlamudi</title>
  <meta name="description" content="The page you're looking for can't be found.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" type="image/png" href="/assets/img/anikethFavicon.jpg">
  <style>
    .error-code {
      font-family: var(--font-serif);
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.02em;
      margin: 0 0 0.5rem;
      color: var(--color-fg);
    }

    .error-message {
      font-family: var(--font-serif);
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      margin: 0 0 1.5rem;
      color: var(--color-fg);
    }

    .ascii-cat {
      font-family: "Courier New", monospace;
      font-size: clamp(0.85rem, 2vw, 1.15rem);
      line-height: 1.2;
      white-space: pre;
      overflow-x: auto;
      margin: 1.5rem 0;
      color: var(--color-muted);
    }

    .redirect-info {
      font-size: 0.95rem;
      font-style: italic;
      margin: 1rem 0 1.5rem;
      color: var(--color-muted);
    }

    .countdown {
      font-weight: 600;
      color: var(--color-fg);
    }

    @media (max-width: 600px) {
      .ascii-cat { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <main>
    <section class="home" id="error">
      <div class="home__left home__left--centered">
        <h1 class="hero__title" id="hero-title"><a href="/" style="text-decoration: none; color: inherit;"><span class="hero__name-first">Aniketh</span><br><span class="hero__name-last">Bandlamudi</span></a></h1>
        <nav class="hero__nav">
          <a href="/projects/" class="hero__nav-link">Projects</a>
          <a href="/work/" class="hero__nav-link">Experience</a>
          <a href="/photos/" class="hero__nav-link">Photography</a>
          <a href="/writing/" class="hero__nav-link">Writing</a>
          <a href="/contact/" class="hero__nav-link">Contact</a>
        </nav>
      </div>

      <div class="home__right">
        <h1 class="error-code">404</h1>
        <h2 class="error-message">The page you're looking for can't be found</h2>

        <div class="ascii-cat" aria-hidden="true">
    /\_/\
   ( o.o )
    > ^ <
   /|   |\
  (_|   |_)

  "this page
   doesn't exist..."
        </div>

        <p class="redirect-info">
          Redirecting you home in <span class="countdown" id="countdown">5</span> seconds...
        </p>

        <a href="/" class="btn">
          Take Me Home Now
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </a>
      </div>
    </section>
  </main>

  <script>
    // Apply saved theme before paint to avoid a flash
    (function () {
      document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'auto');
    })();

    // Auto-redirect countdown
    (function () {
      let seconds = 5;
      const el = document.getElementById('countdown');
      const timer = setInterval(() => {
        seconds--;
        if (el) el.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(timer);
          window.location.href = '/';
        }
      }, 1000);
    })();
  </script>
  <script src="/assets/js/main.js" defer></script>
</body>
</html>
